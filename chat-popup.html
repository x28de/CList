<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CList Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Roboto, sans-serif;
      font-size: 14px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #fafafa;
    }
    #chat-title {
      padding: 10px 14px;
      background: #ddd;
      font-weight: 500;
      border-bottom: 1px solid #ccc;
      flex-shrink: 0;
    }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    #chat-messages div {
      padding: 2px 0;
      word-break: break-word;
    }
    .chat-event {
      color: #888;
      font-style: italic;
      font-size: 12px;
      text-align: center !important;
      padding: 4px 0;
    }
    #chat-input-row {
      display: flex;
      padding: 8px 10px;
      gap: 6px;
      border-top: 1px solid #ddd;
      flex-shrink: 0;
      background: #fff;
    }
    #messageInput {
      flex: 1;
      padding: 6px 8px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 3px;
      font-family: Roboto, sans-serif;
    }
    #sendButton {
      padding: 6px 14px;
      background: rgb(81, 177, 88);
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-family: Roboto, sans-serif;
      font-size: 14px;
    }
    #sendButton:hover { background: rgb(60, 150, 65); }
    #startDocButton { padding: 6px 10px; background: #888; color: white; border: none; border-radius: 3px; cursor: pointer; font-family: Roboto, sans-serif; font-size: 13px; }
    #startDocButton:hover { background: #666; }
  </style>
</head>
<body>
  <div id="chat-title">CList Chat</div>
  <div id="chat-messages">
    <div id="no-connection" class="chat-event">Connecting to CList…</div>
  </div>
  <div id="chat-input-row">
    <input type="text" id="messageInput" placeholder="Type a message…" autocomplete="off">
    <button id="sendButton">Send</button>
    <button id="startDocButton" title="Start a shared document from this discussion">Start doc</button>
  </div>

  <script>
    const bc = new BroadcastChannel('clist-chat');
    const messagesEl = document.getElementById('chat-messages');
    const noConnectionEl = document.getElementById('no-connection');

    bc.onmessage = (e) => {
      const { type } = e.data;
      if (type === 'chat-msg') {
        noConnectionEl.style.display = 'none';
        appendMessage(e.data);
      } else if (type === 'chat-card') {
        noConnectionEl.style.display = 'none';
        appendCard(e.data);
      } else if (type === 'chat-state') {
        noConnectionEl.style.display = 'none';
        if (e.data.discussionName) {
          const label = `CList Chat — ${e.data.discussionName}`;
          document.title = label;
          document.getElementById('chat-title').textContent = label;
        }
      }
    };

    // Tell the main CList window we are ready to receive messages.
    bc.postMessage({ type: 'popup-ready' });

    function appendMessage({ html, isOwn, isEvent }) {
      const div = document.createElement('div');
      div.innerHTML = html; // already sanitized by main window
      if (isEvent) div.classList.add('chat-event');
      else div.style.textAlign = isOwn ? 'right' : 'left';
      messagesEl.appendChild(div);
      div.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    function escText(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function appendCard({ sender, kind, title, url, excerpt, items, isOwn }) {
      const kindLabel = { item: 'an item', collection: 'a collection', annotation: 'an annotation' }[kind] || 'something';
      const wrapper = document.createElement('div');
      wrapper.style.textAlign = isOwn ? 'right' : 'left';

      const card = document.createElement('div');
      card.style.cssText = 'display:inline-block;border:1px solid #ccc;border-radius:6px;padding:8px 12px;margin:4px 0;background:#f9f9f9;max-width:300px;font-size:13px;text-align:left';

      const hdr = document.createElement('div');
      hdr.style.cssText = 'color:#555;margin-bottom:4px';
      hdr.innerHTML = `<strong>${escText(sender)}</strong> shared ${kindLabel}:`;
      card.appendChild(hdr);

      if ((title || url) && kind !== 'collection') {
        const titleEl = document.createElement('div');
        titleEl.style.cssText = 'font-weight:500;margin-bottom:4px';
        titleEl.innerHTML = url
          ? `<a href="${escText(url)}" target="_blank" rel="noopener noreferrer">${escText(title || url)}</a>`
          : escText(title || '');
        card.appendChild(titleEl);
      }

      if (kind === 'collection' && Array.isArray(items) && items.length) {
        const details = document.createElement('details');
        details.style.cssText = 'margin-top:2px';
        const summary = document.createElement('summary');
        summary.style.cssText = 'font-weight:500;cursor:pointer;font-size:13px';
        summary.textContent = title || 'Untitled collection';
        details.appendChild(summary);

        const ul = document.createElement('ul');
        ul.style.cssText = 'list-style:none;padding:0;margin:4px 0';
        items.forEach(item => {
          const li = document.createElement('li');
          li.style.cssText = 'display:flex;align-items:center;justify-content:space-between;gap:6px;margin:2px 0;font-size:12px';
          const nameSpan = document.createElement('span');
          nameSpan.style.cssText = 'flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
          nameSpan.textContent = item.title || item.url || '';
          li.appendChild(nameSpan);
          if (item.url) {
            const btn = document.createElement('button');
            btn.title = 'Open in new window';
            btn.style.cssText = 'background:none;border:none;cursor:pointer;padding:2px;color:rgb(81,177,88);font-size:16px;flex-shrink:0';
            btn.textContent = '↗';
            btn.addEventListener('click', (e) => {
              e.stopPropagation();
              window.open(item.url, '_blank', 'width=800,height=600,scrollbars=yes');
            });
            li.appendChild(btn);
          }
          ul.appendChild(li);
        });
        details.appendChild(ul);
        card.appendChild(details);
      }

      if (excerpt && kind !== 'collection') {
        const ex = document.createElement('div');
        ex.style.cssText = 'color:#666;font-size:12px;margin-top:4px;word-break:break-word';
        ex.textContent = excerpt;
        card.appendChild(ex);
      }

      wrapper.appendChild(card);
      messagesEl.appendChild(wrapper);
      wrapper.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    function doSend() {
      const input = document.getElementById('messageInput');
      const msg = input.value.trim();
      if (!msg) return;
      bc.postMessage({ type: 'send-msg', message: msg });
      input.value = '';
      input.focus();
    }

    document.getElementById('sendButton').addEventListener('click', doSend);
    document.getElementById('startDocButton').addEventListener('click', () => {
      bc.postMessage({ type: 'start-collab-from-chat' });
    });
    document.getElementById('messageInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doSend();
    });

    window.addEventListener('beforeunload', () => {
      bc.postMessage({ type: 'popup-closed' });
      bc.close();
    });
  </script>
</body>
</html>
