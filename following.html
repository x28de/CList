<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Following</title>
    <script>
        let username;
        let flaskSiteUrl = 'https://kvstore.mooc.ca';
    </script>
    <script>if (localStorage.getItem('clist-dark-mode') === '1') document.documentElement.classList.add('dark-mode');</script>
    <link rel="stylesheet" href="css/interface.css">
    <link rel="stylesheet" href="css/reader.css">
    <link rel="stylesheet" href="css/kvlist.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <style>
        .me-section { border-bottom: none; }
    </style>
</head>
<body>
<div class="kvcontainer">

    <button class="back-btn" onclick="window.parent.history.back()">&#8592; Back</button>

    <div class="me-section">
        <h3>Following</h3>
        <div id="following-list" class="me-status">Loading…</div>
    </div>

</div>

<script src="js/utilities.js"></script>
<script src="js/crypto_utils.js"></script>
<script>

    async function loadFollowing() {
        const listEl  = document.getElementById('following-list');
        const token   = getSiteSpecificCookie(flaskSiteUrl, 'access_token');
        username      = getSiteSpecificCookie(flaskSiteUrl, 'username');

        if (!token || !username) {
            listEl.textContent = 'Not logged in — please log in first.';
            return;
        }

        let kvs;
        try {
            const res = await fetch(`${flaskSiteUrl}/get_kvs/`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (!res.ok) throw new Error(`Server returned ${res.status}`);
            kvs = await res.json();
        } catch (err) {
            console.error('loadFollowing fetch failed:', err);
            listEl.textContent = `Could not load data (${err.message}). Check your connection or log in again.`;
            return;
        }

        const followingItems = kvs.filter(k => k.key.startsWith('social:following:'));

        if (followingItems.length === 0) {
            listEl.textContent = 'Not following anyone yet.';
            return;
        }

        const encKey = await window.parent.getEncKey(flaskSiteUrl);
        if (!encKey) {
            listEl.textContent = 'Encryption key not available — please log in again.';
            return;
        }

        const myDomain = (flaskSiteUrl || '').replace(/^https?:\/\//, '');
        listEl.innerHTML = '';

        for (const kv of followingItems) {
            let did = kv.key.replace('social:following:', '');
            try {
                const decrypted = await decryptWithKey(encKey, kv.value);
                did = JSON.parse(decrypted).did || did;
            } catch(e) {
                console.error('Could not decrypt follow entry:', kv.key, e);
            }

            const parts = did.split(':');
            const displayName = parts[parts.length - 1] || did;
            const domain = parts[2] || '';
            const profileUrl = domain ? `https://${domain}/users/${displayName}/did.html` : '';

            const row = document.createElement('div');
            row.className = 'following-item';

            const nameEl = document.createElement('span');
            nameEl.className = 'following-name';
            if (profileUrl) {
                const a = document.createElement('a');
                a.href = profileUrl;
                a.target = '_blank';
                a.textContent = domain !== myDomain ? `${displayName} (${domain})` : displayName;
                nameEl.appendChild(a);
            } else {
                nameEl.textContent = did;
            }
            row.appendChild(nameEl);

            const btn = document.createElement('button');
            btn.className = 'unfollow-btn';
            btn.textContent = 'Unfollow';
            btn.onclick = () => unfollowDid(kv.key, row);
            row.appendChild(btn);

            listEl.appendChild(row);
        }
    }

    async function unfollowDid(kvKey, rowEl) {
        const token = getSiteSpecificCookie(flaskSiteUrl, 'access_token');
        try {
            const resp = await fetch(`${flaskSiteUrl}/delete_kv/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token,
                },
                body: JSON.stringify({ key: kvKey }),
            });
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            if (typeof window.parent._clistAnnotateInvalidateFollowCache === 'function') {
                window.parent._clistAnnotateInvalidateFollowCache();
            }
            rowEl.remove();
            const listEl = document.getElementById('following-list');
            if (!listEl.hasChildNodes()) {
                listEl.textContent = 'Not following anyone yet.';
            }
        } catch(e) {
            console.error('Unfollow failed:', e);
            window.parent.showStatusMessage('Unfollow failed: ' + e.message);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        setTimeout(loadFollowing, 300);
    });

</script>
</body>
</html>
