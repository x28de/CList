<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Me</title>
    <script>if (localStorage.getItem('clist-dark-mode') === '1') document.documentElement.classList.add('dark-mode');</script>
    <link rel="stylesheet" href="css/interface.css">
    <link rel="stylesheet" href="css/kvlist.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <style>
        .me-section { padding-top: 1rem; }
    </style>
</head>
<body>
<div class="kvcontainer">
    <div class="me-section">

        <div class="nav-item">
            <button class="nav-btn" onclick="window.parent.playFollowing()">Following</button>
            <p class="nav-desc">People you follow. Their annotations appear alongside your own when you view annotation threads.</p>
        </div>

        <div class="nav-item">
            <button class="nav-btn" onclick="window.parent.playDid()">Identity</button>
            <p class="nav-desc">Manage your decentralized identity (DID), link your social accounts, and control what is publicly visible.</p>
        </div>

        <div class="nav-item">
            <button class="nav-btn" onclick="window.parent.playOptions()">Options</button>
            <p class="nav-desc">Configure application preferences and settings.</p>
        </div>

    </div>
</div>
</body>
</html>
