<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Options</title>
    <script>if (localStorage.getItem('clist-dark-mode') === '1') document.documentElement.classList.add('dark-mode');</script>
    <link rel="stylesheet" href="css/interface.css">
    <link rel="stylesheet" href="css/kvlist.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <style>
        .me-section { border-bottom: none; }
    </style>
</head>
<body>
<div class="kvcontainer">

    <button class="back-btn" onclick="window.parent.history.back()">&#8592; Back</button>

    <div class="me-section">
        <h3>Options</h3>
        <div class="nav-item">
            <button class="nav-btn" id="dark-mode-toggle" onclick="toggleDarkMode()">Dark Mode: Off</button>
            <p class="nav-desc">Switch between light and dark colour schemes.</p>
        </div>
        <div class="nav-item">
            <button class="nav-btn" id="webmention-toggle" onclick="toggleWebMention()">WebMention: Off</button>
            <p class="nav-desc">When on, notifies source URLs via <a href="https://www.w3.org/TR/webmention/" target="_blank">WebMention</a> after each publish.</p>
        </div>
    </div>
</div>
<script>
    function updateToggle() {
        const isDark = window.parent
            ? window.parent.document.documentElement.classList.contains('dark-mode')
            : document.documentElement.classList.contains('dark-mode');
        document.getElementById('dark-mode-toggle').textContent =
            isDark ? 'Dark Mode: On' : 'Dark Mode: Off';
    }
    function toggleDarkMode() {
        const parentHtml = window.parent
            ? window.parent.document.documentElement
            : document.documentElement;
        const isNowDark = parentHtml.classList.toggle('dark-mode');
        document.documentElement.classList.toggle('dark-mode', isNowDark);
        localStorage.setItem('clist-dark-mode', isNowDark ? '1' : '0');
        // Sync TinyMCE content iframes (chrome is handled by CSS; content area needs injection)
        try {
            const parentWin = window.parent || window;
            if (parentWin.tinymce) {
                parentWin.tinymce.editors.forEach(ed => {
                    try {
                        const doc = ed.getDoc();
                        if (!doc) return;
                        let s = doc.getElementById('clist-dm');
                        if (isNowDark) {
                            if (!s) { s = doc.createElement('style'); s.id = 'clist-dm'; doc.head.appendChild(s); }
                            s.textContent = 'body{background:#1e1e1e!important;color:#e0e0e0!important}';
                        } else if (s) {
                            s.remove();
                        }
                    } catch(e) {}
                });
            }
        } catch(e) {}
        updateToggle();
    }
    function updateWebMentionToggle() {
        const on = localStorage.getItem('clist_webmention_enabled') === 'true';
        document.getElementById('webmention-toggle').textContent = on ? 'WebMention: On' : 'WebMention: Off';
    }
    function toggleWebMention() {
        const on = localStorage.getItem('clist_webmention_enabled') === 'true';
        const nowOn = !on;
        localStorage.setItem('clist_webmention_enabled', nowOn ? 'true' : 'false');
        // Keep in sync with parent frame if loaded
        if (window.parent && typeof window.parent.setWebmentionEnabled === 'function') {
            window.parent.setWebmentionEnabled(nowOn);
        }
        updateWebMentionToggle();
    }
    document.addEventListener('DOMContentLoaded', () => { updateToggle(); updateWebMentionToggle(); });
</script>
</body>
</html>
